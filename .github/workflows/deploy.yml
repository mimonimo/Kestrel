name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write   # OIDC 자격증명 (Secrets 정적 키 X)
  contents: read

env:
  AWS_REGION: ap-northeast-2
  CLUSTER_NAME: kestrel-prod
  ECR_REPO_API: kestrel-prod-api
  ECR_REPO_FRONTEND: kestrel-prod-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO_API:$TAG -t $REGISTRY/$ECR_REPO_API:latest ./backend
          docker push $REGISTRY/$ECR_REPO_API:$TAG
          docker push $REGISTRY/$ECR_REPO_API:latest

      - name: Build & push Frontend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }} \
            -t $REGISTRY/$ECR_REPO_FRONTEND:$TAG \
            -t $REGISTRY/$ECR_REPO_FRONTEND:latest \
            ./frontend
          docker push $REGISTRY/$ECR_REPO_FRONTEND:$TAG
          docker push $REGISTRY/$ECR_REPO_FRONTEND:latest

      - name: Roll API + scheduler + frontend
        run: |
          for svc in kestrel-prod-api kestrel-prod-scheduler kestrel-prod-frontend; do
            aws ecs update-service \
              --cluster $CLUSTER_NAME \
              --service $svc \
              --force-new-deployment \
              --region $AWS_REGION
          done

      - name: Wait for stable
        run: |
          aws ecs wait services-stable \
            --cluster $CLUSTER_NAME \
            --services kestrel-prod-api kestrel-prod-scheduler kestrel-prod-frontend \
            --region $AWS_REGION
