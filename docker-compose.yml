services:
  frontend:
    # CI(GitHub Actions)가 빌드해 GHCR 에 올린 이미지. 운영은 이걸 pull 한다.
    # 로컬 개발은 아래 build: 로 직접 빌드(이미지 태그만 공유).
    image: ghcr.io/mimonimo/kestrel-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_API_BASE_URL 은 *빌드 타임* 에 Next.js 번들에 박힘.
      # 로컬은 frontend(:3000) ≠ backend(:8000) 다른 origin 이라 상대경로 X →
      # 빌드 인자로 절대 URL 명시. 운영(AWS, Caddy 동일 origin) 은 /api/v1.
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      - INTERNAL_API_BASE_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    # CI(GitHub Actions)가 빌드해 GHCR 에 올린 이미지. 운영은 pull. 로컬은 build.
    image: ghcr.io/mimonimo/kestrel-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # Claude Code CLI is now baked in by default — the dashboard's
        # "Claude 로그인" flow runs `claude setup-token` inside the
        # container to obtain OAuth credentials. Set INSTALL_CLAUDE_CLI=0
        # in your shell or .env to skip the install (~200 MB image savings,
        # but disables AI analysis entirely until you wire a different
        # provider).
        INSTALL_CLAUDE_CLI: ${INSTALL_CLAUDE_CLI:-1}
    ports:
      - "8000:8000"
    environment:
      # ENV/DEBUG 를 컨테이너로 *명시 전달*. 빠져 있으면 .env(호스트)는 compose
      # 변수치환에만 쓰이고 컨테이너 안엔 안 들어가 → 앱이 기본값(env=development,
      # debug=True)으로 떠서 운영인데도 ① 쿠키 Secure 플래그 off(보안 갭) ②
      # debug 로깅/SQL echo 폭증 ③ prod 가드 미적용 상태가 된다. 로컬은 .env 없으면
      # 기본값(development/true)으로 떨어져 개발 편의 유지.
      - ENV=${ENV:-development}
      - DEBUG=${DEBUG:-true}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MEILI_HOST=${MEILI_HOST}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - NVD_API_KEY=${NVD_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # .env 의 CORS_ORIGINS 를 그대로 전달(운영 도메인). 하드코딩하면 .env 갱신이
      # 무시돼 운영에서도 localhost 로 떠 알림 웹훅의 CVE 링크가 깨진다(PR 10-EW 의
      # ENV/DEBUG 와 같은 부류). 로컬은 기본값(localhost:3000)으로 떨어진다.
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
      # ─── Auth (PR 10-CN) ────────────────────────────────────
      # 운영에서는 반드시 외부 시크릿(.env / vault) 으로 64자 무작위 문자열 주입.
      # 개발 기본값(dev-only-...) 은 서버 시작은 가능하지만 절대 운영에 사용 금지.
      - JWT_SECRET=${JWT_SECRET:-dev-only-change-me-in-production-please-32chars-min}
      - JWT_EXP_HOURS=${JWT_EXP_HOURS:-12}
      # 가입 시 자동으로 admin 권한이 부여될 이메일 (콤마 분리). 첫 운영자 부트스트랩용.
      - INITIAL_ADMIN_EMAILS=${INITIAL_ADMIN_EMAILS:-}
      # ─── 이메일 (회원가입 인증 / 비밀번호 재설정) ───────────
      # 로컬은 기본 비활성(콘솔 모드) — 발송 대신 백엔드 로그에 인증 링크 출력.
      # 운영(AWS)은 user_data 가 .env 로 EMAIL_ENABLED=true + SES 설정 주입.
      - EMAIL_ENABLED=${EMAIL_ENABLED:-false}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-ses}
      - EMAIL_FROM=${EMAIL_FROM:-no-reply@localhost}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-Kestrel}
      # 외부 SMTP(Resend 등) — EMAIL_PROVIDER=smtp 일 때 사용.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_SSL=${SMTP_SSL:-true}
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      # 에러 추적(Sentry) — DSN 설정 시 활성화, 없으면 no-op.
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    volumes:
      # Claude Code OAuth credentials persist here. The dashboard's
      # "Claude 로그인" panel runs `claude setup-token` inside this
      # container, which writes ~/.claude/.credentials.json — the named
      # volume keeps that file across container recreates so the user
      # only authenticates once. (PR 10-AD)
      - claude_credentials:/home/app/.claude
      # MITRE cvelistV5 repo persisted in a named volume — the parser
      # `git clone`s ~5GB on first backfill and `git pull`s deltas after.
      # Bind mount not needed because nothing else (host docker daemon
      # included) reads this path. (PR 10-AF)
      - mitre_cvelist:/data/mitre_cvelist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    # ─── 성능 튜닝 (PR perf-A) ──────────────────────────────
    # 기본 postgres 설정은 shared_buffers=128MB/work_mem=4MB 라 356k행·2.6GB
    # 의 vulnerabilities 테이블 집계(count distinct over join)가 디스크로
    # 스필되어 수 분~수십 분 걸렸다. 단일 호스트(t4g.small 2GB)에 맞춰 상향.
    #   - shared_buffers: PG 전용 캐시. 인스턴스 RAM 의 ~20%.
    #   - effective_cache_size: 플래너 힌트(실제 할당 X) — OS page cache 포함 가용량.
    #   - work_mem: 정렬/해시 집계 1노드당. distinct/group by 가 메모리에 머물게.
    #   - maintenance_work_mem: VACUUM/인덱스.
    #   - random_page_cost/effective_io_concurrency: gp3 SSD 가정.
    #   - jit off: 약한 CPU 에서 JIT 컴파일 오버헤드가 분석쿼리에 오히려 손해.
    # statement_timeout 은 여기(서버 전역)에 두지 않는다 — 백그라운드 수집/백필
    # (대량 UPDATE)이 끊기면 안 되므로 API 요청 세션(get_db)에만 적용한다.
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=384MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=96MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "jit=off"
      # ─── autovacuum / 통계 (PR perf-A3) ─────────────────────
      # 대량 수집(MITRE 36만 등) 후 통계가 stale 해지면 플래너가 seq scan 으로
      # 빠져 집계가 분 단위가 됐다. 더 자주·공격적으로 vacuum/analyze 한다.
      #   - scale_factor 하향: 변경분 비율이 작아도 일찍 vacuum/analyze.
      #   - cost_limit 상향: 라운드당 더 많이 처리해 빨리 따라잡음.
      #   - naptime 단축: 더 자주 점검.
      - "-c"
      - "autovacuum_vacuum_scale_factor=0.05"
      - "-c"
      - "autovacuum_analyze_scale_factor=0.02"
      - "-c"
      - "autovacuum_vacuum_cost_limit=2000"
      - "-c"
      - "autovacuum_naptime=30s"
      - "-c"
      - "autovacuum_max_workers=3"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.10
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meili_data:
  claude_credentials:
  mitre_cvelist:

networks:
  default:
