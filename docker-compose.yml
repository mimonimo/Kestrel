services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      - INTERNAL_API_BASE_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # Set INSTALL_CLAUDE_CLI=1 in your shell or .env to install Claude
        # Code CLI for the "claude_cli" AI analysis provider.
        INSTALL_CLAUDE_CLI: ${INSTALL_CLAUDE_CLI:-0}
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MEILI_HOST=${MEILI_HOST}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - NVD_API_KEY=${NVD_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CORS_ORIGINS=["http://localhost:3000"]
      - SANDBOX_NETWORK=${SANDBOX_NETWORK:-kestrel_sandbox_net}
      - SANDBOX_TTL_SECONDS=${SANDBOX_TTL_SECONDS:-1800}
    volumes:
      # Sandbox feature spawns sibling containers via the host docker daemon.
      # Mounting the socket grants root-equivalent control of docker — the
      # API restricts what images/limits/networks are accepted (see
      # app/services/sandbox/manager.py).
      - /var/run/docker.sock:/var/run/docker.sock
    # The non-root app user needs membership in whatever group owns the host
    # docker.sock. On macOS+OrbStack the socket appears as root:root inside
    # the container, so adding GID 0 grants access. On Linux hosts set
    # DOCKER_GID in .env to the host's `docker` group GID (e.g. 999/998).
    group_add:
      - "${DOCKER_GID:-0}"
    networks:
      - default
      - sandbox
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.10
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meili_data:

networks:
  default:
  # Isolated bridge network where every sandbox lab container is attached.
  # `internal: true` blocks egress to the internet/host so AI-generated
  # exploit payloads cannot reach external systems. The backend container
  # is also attached so it can reach lab targets by container name.
  sandbox:
    name: kestrel_sandbox_net
    driver: bridge
    internal: true
