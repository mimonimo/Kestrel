services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_API_BASE_URL 은 *빌드 타임* 에 Next.js 번들에 박힘.
      # 로컬은 frontend(:3000) ≠ backend(:8000) 다른 origin 이라 상대경로 X →
      # 빌드 인자로 절대 URL 명시. 운영(AWS, Caddy 동일 origin) 은 /api/v1.
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      - INTERNAL_API_BASE_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # Claude Code CLI is now baked in by default — the dashboard's
        # "Claude 로그인" flow runs `claude setup-token` inside the
        # container to obtain OAuth credentials. Set INSTALL_CLAUDE_CLI=0
        # in your shell or .env to skip the install (~200 MB image savings,
        # but disables AI analysis entirely until you wire a different
        # provider).
        INSTALL_CLAUDE_CLI: ${INSTALL_CLAUDE_CLI:-1}
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MEILI_HOST=${MEILI_HOST}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - NVD_API_KEY=${NVD_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CORS_ORIGINS=["http://localhost:3000"]
      - SANDBOX_NETWORK=${SANDBOX_NETWORK:-kestrel_sandbox_net}
      - SANDBOX_TTL_SECONDS=${SANDBOX_TTL_SECONDS:-1800}
      # vulhub lab harvester (PR9-B). VULHUB_HOST_PATH must be an absolute
      # path on the *host* — the host docker daemon reads compose files from
      # this path when spawning sibling stacks. VULHUB_REPO_PATH is the
      # equivalent path inside the backend container; keep them identical
      # unless you need to remap.
      - VULHUB_REPO_PATH=${VULHUB_REPO_PATH:-/data/vulhub}
      - VULHUB_HOST_PATH=${VULHUB_HOST_PATH:-/data/vulhub}
      - VULHUB_REPO_REMOTE=${VULHUB_REPO_REMOTE:-https://github.com/vulhub/vulhub.git}
      # Sandbox hardening (PR9-C, opt-in). All four are no-ops when unset
      # so default deployments behave identically to pre-9-C.
      - SANDBOX_HARDEN=${SANDBOX_HARDEN:-false}
      - SANDBOX_RUNTIME=${SANDBOX_RUNTIME:-}
      - SANDBOX_SECCOMP_PATH=${SANDBOX_SECCOMP_PATH:-}
      - SANDBOX_OVERRIDE_DIR=${SANDBOX_OVERRIDE_DIR:-}
      # ─── Auth (PR 10-CN) ────────────────────────────────────
      # 운영에서는 반드시 외부 시크릿(.env / vault) 으로 64자 무작위 문자열 주입.
      # 개발 기본값(dev-only-...) 은 서버 시작은 가능하지만 절대 운영에 사용 금지.
      - JWT_SECRET=${JWT_SECRET:-dev-only-change-me-in-production-please-32chars-min}
      - JWT_EXP_HOURS=${JWT_EXP_HOURS:-12}
      # 가입 시 자동으로 admin 권한이 부여될 이메일 (콤마 분리). 첫 운영자 부트스트랩용.
      - INITIAL_ADMIN_EMAILS=${INITIAL_ADMIN_EMAILS:-}
    volumes:
      # Sandbox feature spawns sibling containers via the host docker daemon.
      # Mounting the socket grants root-equivalent control of docker — the
      # API restricts what images/limits/networks are accepted (see
      # app/services/sandbox/manager.py).
      - /var/run/docker.sock:/var/run/docker.sock
      # vulhub repo bind mount — same path on host & container so the host
      # docker daemon can read compose files at the path our code passes.
      - ${VULHUB_HOST_PATH:-/data/vulhub}:${VULHUB_REPO_PATH:-/data/vulhub}
      # Claude Code OAuth credentials persist here. The dashboard's
      # "Claude 로그인" panel runs `claude setup-token` inside this
      # container, which writes ~/.claude/.credentials.json — the named
      # volume keeps that file across container recreates so the user
      # only authenticates once. (PR 10-AD)
      - claude_credentials:/home/app/.claude
      # MITRE cvelistV5 repo persisted in a named volume — the parser
      # `git clone`s ~5GB on first backfill and `git pull`s deltas after.
      # Bind mount not needed because nothing else (host docker daemon
      # included) reads this path. (PR 10-AF)
      - mitre_cvelist:/data/mitre_cvelist
    # The non-root app user needs membership in whatever group owns the host
    # docker.sock. On macOS+OrbStack the socket appears as root:root inside
    # the container, so adding GID 0 grants access. On Linux hosts set
    # DOCKER_GID in .env to the host's `docker` group GID (e.g. 999/998).
    group_add:
      - "${DOCKER_GID:-0}"
    networks:
      - default
      - sandbox
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.10
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meili_data:
  claude_credentials:
  mitre_cvelist:

networks:
  default:
  # Isolated bridge network where every sandbox lab container is attached.
  # `internal: true` blocks egress to the internet/host so AI-generated
  # exploit payloads cannot reach external systems. The backend container
  # is also attached so it can reach lab targets by container name.
  sandbox:
    name: kestrel_sandbox_net
    driver: bridge
    internal: true
