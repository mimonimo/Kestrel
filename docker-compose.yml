services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_API_BASE_URL 은 *빌드 타임* 에 Next.js 번들에 박힘.
      # 로컬은 frontend(:3000) ≠ backend(:8000) 다른 origin 이라 상대경로 X →
      # 빌드 인자로 절대 URL 명시. 운영(AWS, Caddy 동일 origin) 은 /api/v1.
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      - INTERNAL_API_BASE_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # Claude Code CLI is now baked in by default — the dashboard's
        # "Claude 로그인" flow runs `claude setup-token` inside the
        # container to obtain OAuth credentials. Set INSTALL_CLAUDE_CLI=0
        # in your shell or .env to skip the install (~200 MB image savings,
        # but disables AI analysis entirely until you wire a different
        # provider).
        INSTALL_CLAUDE_CLI: ${INSTALL_CLAUDE_CLI:-1}
    ports:
      - "8000:8000"
    environment:
      # ENV/DEBUG 를 컨테이너로 *명시 전달*. 빠져 있으면 .env(호스트)는 compose
      # 변수치환에만 쓰이고 컨테이너 안엔 안 들어가 → 앱이 기본값(env=development,
      # debug=True)으로 떠서 운영인데도 ① 쿠키 Secure 플래그 off(보안 갭) ②
      # debug 로깅/SQL echo 폭증 ③ prod 가드 미적용 상태가 된다. 로컬은 .env 없으면
      # 기본값(development/true)으로 떨어져 개발 편의 유지.
      - ENV=${ENV:-development}
      - DEBUG=${DEBUG:-true}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MEILI_HOST=${MEILI_HOST}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - NVD_API_KEY=${NVD_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # .env 의 CORS_ORIGINS 를 그대로 전달(운영 도메인). 하드코딩하면 .env 갱신이
      # 무시돼 운영에서도 localhost 로 떠 알림 웹훅의 CVE 링크가 깨진다(PR 10-EW 의
      # ENV/DEBUG 와 같은 부류). 로컬은 기본값(localhost:3000)으로 떨어진다.
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
      # ─── Auth (PR 10-CN) ────────────────────────────────────
      # 운영에서는 반드시 외부 시크릿(.env / vault) 으로 64자 무작위 문자열 주입.
      # 개발 기본값(dev-only-...) 은 서버 시작은 가능하지만 절대 운영에 사용 금지.
      - JWT_SECRET=${JWT_SECRET:-dev-only-change-me-in-production-please-32chars-min}
      - JWT_EXP_HOURS=${JWT_EXP_HOURS:-12}
      # 가입 시 자동으로 admin 권한이 부여될 이메일 (콤마 분리). 첫 운영자 부트스트랩용.
      - INITIAL_ADMIN_EMAILS=${INITIAL_ADMIN_EMAILS:-}
    volumes:
      # Claude Code OAuth credentials persist here. The dashboard's
      # "Claude 로그인" panel runs `claude setup-token` inside this
      # container, which writes ~/.claude/.credentials.json — the named
      # volume keeps that file across container recreates so the user
      # only authenticates once. (PR 10-AD)
      - claude_credentials:/home/app/.claude
      # MITRE cvelistV5 repo persisted in a named volume — the parser
      # `git clone`s ~5GB on first backfill and `git pull`s deltas after.
      # Bind mount not needed because nothing else (host docker daemon
      # included) reads this path. (PR 10-AF)
      - mitre_cvelist:/data/mitre_cvelist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.10
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meili_data:
  claude_credentials:
  mitre_cvelist:

networks:
  default:
